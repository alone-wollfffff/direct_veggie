<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Viewport & display ───────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── Theme & app info ─────────────────────────────── -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="description" content="Order fresh vegetables directly from your local vendor. Zero hassle, delivered to your door." />
    <meta name="application-name" content="VeggieDirect" />

    <!-- ── iOS PWA (Add to Home Screen on iPhone/iPad) ──── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VeggieDirect" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- ── Icons & manifest ──────────────────────────────── -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Open Graph (looks good when shared on WhatsApp) ─ -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Veggie Direct 🥬" />
    <meta property="og:description" content="Order fresh vegetables directly from your local vendor." />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- ── Fonts ─────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Veggie Direct 🥬</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
